<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift Task Tracker</title>
  <style>
    :root {
      --page-bg: #0b1222;
      --card-bg: #17243a;
      --panel-bg: #0d1627;
      --text-main: #ffffff;
      --text-muted: #8ea6d3;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #18bd86;
      --success-hover: #10a875;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --border: #2b3d5b;
      --focus: #00d39f;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
      padding: 5rem 1rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .tracker-container {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    h1,
    .progress-container,
    #currentTaskDisplay,
    #statusDisplay { display: none; }

    .metrics-grid {
      display: block;
      margin-bottom: 1.9rem;
    }

    .metric-card {
      display: none;
    }

    .metric-card:nth-child(2) {
      display: block;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2rem 1rem 1.7rem;
      text-align: center;
    }

    .metric-card:nth-child(2) .metric-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .metric-card:nth-child(2) .metric-value {
      font-size: clamp(3rem, 8vw, 4.7rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.12em;
      font-variant-numeric: tabular-nums;
    }

    #currentStartedDisplay {
      display: block;
      margin-bottom: 0.85rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #totalShiftDisplay {
      display: block;
      margin-top: 1.2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 500;
      letter-spacing: 0.12em;
    }

    .input-group {
      display: block;
      margin-bottom: 1.5rem;
    }

    .input-group::before {
      content: "TASK NAME";
      display: block;
      margin-bottom: 0.55rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      height: 48px;
      background: var(--panel-bg);
      color: var(--text-main);
      border: 1px solid var(--focus);
      border-radius: 6px;
      padding: 0 1rem;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus {
      box-shadow: 0 0 0 2px rgba(0, 211, 159, 0.18);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 2.2rem;
    }

    button {
      width: 100%;
      min-height: 48px;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      font-weight: 700;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); }

    .controls button {
      inline-size: 100%;
      min-inline-size: 0;
      white-space: nowrap;
    }

    .btn-primary { background:#22C55E; color:#fff; }
    .btn-primary:hover { background:#16A34A; }

    .btn-secondary { background:#3B82F6; color:#fff; }
    .btn-secondary:hover { background:#2563EB; }

    .btn-warning { background:#F59E0B; color:#fff; }
    .btn-warning:hover { background:#D97706; }

    .btn-danger { background:#64748B; color:#fff; }
    .btn-danger:hover { background:#475569; }

    #resetBtn {
      background:#EF4444;
      color:#fff;
    }

    #resetBtn:hover {
      background:#DC2626;
    }

    .btn-success {
      background:#06B6D4;
      border:none;
      color:#fff;
    }

    .btn-success:hover {
      background:#0891B2;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .table-section h2 {
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      margin: 0 0 1rem;
      text-transform: uppercase;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      border-top: 1px solid var(--border);
    }

    th, td {
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(43, 61, 91, 0.75);
    }

    th {
      color: var(--text-muted);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    td {
      color: var(--text-main);
      font-size: 0.95rem;
    }

    .task-name-cell { font-weight: 700; }
    th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6) { display: none; }

    .btn-rename {
      background: transparent;
      color: var(--text-main);
      padding: 0.35rem;
      min-height: auto;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .tracker-container { padding: 1.5rem; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="tracker-container">
    <h1>Shift Task Tracker</h1>

    <section class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Current Task</div>
        <div id="currentTaskDisplay" class="metric-value">No task</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Current Task Duration</div>
        <div id="currentStartedDisplay">Start: --</div>
        <div id="currentDurationDisplay" class="metric-value">00:00:00</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total Shift</div>
        <div id="totalShiftDisplay" class="metric-value">00:00:00 / 08:00:00</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Status</div>
        <div id="statusDisplay" class="metric-value">Stopped</div>
      </div>
    </section>

    <div class="progress-container">
      <progress id="shiftProgressBar" value="0" max="28800"></progress>
    </div>

    <div class="input-group">
      <input type="text" id="taskNameInput" placeholder="Enter task name..." autocomplete="off" />
    </div>

    <div class="controls">
      <button id="startTaskBtn" class="btn-primary">Start Task</button>
      <button id="nextTaskBtn" class="btn-secondary" disabled>Save &amp; Next Task</button>
      <button id="pauseBreakBtn" class="btn-warning" disabled>Pause Break</button>
      <button id="endShiftBtn" class="btn-danger" disabled>End Shift</button>
      <button id="resetBtn" class="btn-danger">Reset All</button>
      <button id="exportBtn" class="btn-success">Export CSV</button>
    </div>

    <section class="table-section">
      <table>
        <thead>
          <tr>
            <th style="width: 40%;">Task Name</th>
            <th style="width: 22%;">Start</th>
            <th style="width: 22%;">End</th>
            <th style="width: 16%;">Duration</th>
            <th style="width: 15%;">Seconds</th>
            <th style="width: 10%;">Action</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const SHIFT_GOAL_SECONDS = 28800;
    const STORAGE_KEY = 'shiftTaskTrackerStateV2';

    const state = loadState();
    let tickerInterval = null;

    const currentTaskDisplay = document.getElementById('currentTaskDisplay');
    const currentStartedDisplay = document.getElementById('currentStartedDisplay');
    const currentDurationDisplay = document.getElementById('currentDurationDisplay');
    const totalShiftDisplay = document.getElementById('totalShiftDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const shiftProgressBar = document.getElementById('shiftProgressBar');
    const taskNameInput = document.getElementById('taskNameInput');
    const startTaskBtn = document.getElementById('startTaskBtn');
    const nextTaskBtn = document.getElementById('nextTaskBtn');
    const pauseBreakBtn = document.getElementById('pauseBreakBtn');
    const endShiftBtn = document.getElementById('endShiftBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const taskTableBody = document.getElementById('taskTableBody');

    document.addEventListener('DOMContentLoaded', initApp);

    function initApp() {
      startTaskBtn.addEventListener('click', startTask);
      nextTaskBtn.addEventListener('click', nextTask);
      pauseBreakBtn.addEventListener('click', toggleBreak);
      endShiftBtn.addEventListener('click', endShift);
      resetBtn.addEventListener('click', resetAll);
      exportBtn.addEventListener('click', exportTasks);

      render();
      if (state.shiftActive) startTickerLoop();
    }

    function loadState() {
      const defaultState = {
        tasks: [],
        shiftActive: false,
        isPaused: false,
        currentTaskName: '',
        currentTaskStartedAt: null,
        currentTaskSeconds: 0,
        totalShiftSeconds: 0
      };

      try {
        return { ...defaultState, ...JSON.parse(localStorage.getItem(STORAGE_KEY)) };
      } catch (error) {
        console.warn('Saved tracker data was invalid. Starting fresh.', error);
        return defaultState;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function startTickerLoop() {
      clearInterval(tickerInterval);
      tickerInterval = setInterval(() => {
        state.currentTaskSeconds = calculateElapsedSeconds(state.currentTaskStartedAt);
        state.totalShiftSeconds += 1;
        saveState();
        render();
      }, 1000);
    }

    function stopTickerLoop() {
      clearInterval(tickerInterval);
      tickerInterval = null;
    }

    function startTask() {
      state.currentTaskName = taskNameInput.value.trim() || 'Initial Task';
      state.currentTaskStartedAt = new Date().toISOString();
      state.currentTaskSeconds = 0;
      state.shiftActive = true;
      state.isPaused = false;
      saveState();
      startTickerLoop();
      render();
    }

    function nextTask() {
      saveCurrentEntry();
      state.currentTaskName = taskNameInput.value.trim() || 'Next Task';
      state.currentTaskStartedAt = new Date().toISOString();
      state.currentTaskSeconds = 0;
      state.isPaused = false;
      saveState();
      startTickerLoop();
      render();
      taskNameInput.select();
    }

    function toggleBreak() {
      if (!state.shiftActive) return;

      if (state.isPaused) {
        saveCurrentEntry();
        state.currentTaskName = taskNameInput.value.trim() && taskNameInput.value.trim() !== 'Pause Break'
          ? taskNameInput.value.trim()
          : 'Resumed Task';
        state.currentTaskStartedAt = new Date().toISOString();
        state.currentTaskSeconds = 0;
        state.isPaused = false;
      } else {
        saveCurrentEntry();
        state.currentTaskName = 'Pause Break';
        state.currentTaskStartedAt = new Date().toISOString();
        state.currentTaskSeconds = 0;
        state.isPaused = true;
        taskNameInput.value = 'Pause Break';
      }

      saveState();
      startTickerLoop();
      render();
    }

    function endShift() {
      if (state.shiftActive) saveCurrentEntry();
      state.shiftActive = false;
      state.isPaused = false;
      state.currentTaskName = '';
      state.currentTaskStartedAt = null;
      state.currentTaskSeconds = 0;
      stopTickerLoop();
      saveState();
      render();
    }

    function resetAll() {
      if (!confirm('Clear all saved tasks and timers?')) return;
      stopTickerLoop();
      Object.assign(state, {
        tasks: [],
        shiftActive: false,
        isPaused: false,
        currentTaskName: '',
        currentTaskStartedAt: null,
        currentTaskSeconds: 0,
        totalShiftSeconds: 0
      });
      localStorage.removeItem(STORAGE_KEY);
      render();
    }

    function saveCurrentEntry() {
      if (!state.currentTaskName || !state.currentTaskStartedAt) return;

      const endedAt = new Date().toISOString();
      const seconds = calculateElapsedSeconds(state.currentTaskStartedAt, endedAt);
      if (seconds <= 0) return;

      state.tasks.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `task_${Date.now()}`,
        name: state.currentTaskName,
        startedAt: state.currentTaskStartedAt,
        startedAtDisplay: formatDateTime(state.currentTaskStartedAt),
        endedAt,
        endedAtDisplay: formatDateTime(endedAt),
        seconds,
        duration: formatTime(seconds)
      });
    }

    function renameTask(index) {
      const updatedName = prompt('Rename task:', state.tasks[index].name);
      if (!updatedName || !updatedName.trim()) return;
      state.tasks[index].name = updatedName.trim();
      saveState();
      render();
    }

    function render() {
      currentTaskDisplay.textContent = state.currentTaskName || 'No task';
      currentStartedDisplay.textContent = state.currentTaskStartedAt
        ? `Start: ${formatDateTime(state.currentTaskStartedAt)}`
        : 'Start: --';
      currentDurationDisplay.textContent = formatTime(calculateElapsedSeconds(state.currentTaskStartedAt));
      totalShiftDisplay.textContent = `${formatTime(state.totalShiftSeconds)} / 08:00:00`;
      statusDisplay.textContent = state.shiftActive ? (state.isPaused ? 'On Break' : 'Running') : 'Stopped';
      shiftProgressBar.value = Math.min(state.totalShiftSeconds, SHIFT_GOAL_SECONDS);

      startTaskBtn.disabled = state.shiftActive;
      nextTaskBtn.disabled = !state.shiftActive;
      pauseBreakBtn.disabled = !state.shiftActive;
      endShiftBtn.disabled = !state.shiftActive;
      pauseBreakBtn.textContent = state.isPaused ? 'Resume Work' : 'Pause Break';
      pauseBreakBtn.className = state.isPaused ? 'btn-secondary' : 'btn-warning';

      renderTasksTable();
    }

    function renderTasksTable() {
      taskTableBody.innerHTML = '';

      state.tasks.forEach((task, index) => {
        const seconds = getTaskSeconds(task);
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="task-name-cell"></td>
          <td>${task.startedAtDisplay || formatDateTime(task.startedAt)}</td>
          <td>${task.endedAtDisplay || formatDateTime(task.endedAt)}</td>
          <td>${formatTime(seconds)}</td>
          <td>${seconds}</td>
          <td><button class="btn-rename" type="button" title="Rename Task">✏️</button></td>
        `;

        row.querySelector('.task-name-cell').textContent = task.name;
        row.querySelector('button').addEventListener('click', () => renameTask(index));
        taskTableBody.appendChild(row);
      });
    }

    function calculateElapsedSeconds(startValue, endValue = new Date().toISOString()) {
      if (!startValue || !endValue) return 0;

      const start = new Date(startValue);
      const end = new Date(endValue);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return 0;

      return Math.max(0, Math.round((end.getTime() - start.getTime()) / 1000));
    }

    function getTaskSeconds(task) {
      const calculatedSeconds = calculateElapsedSeconds(task.startedAt, task.endedAt);
      if (calculatedSeconds > 0) return calculatedSeconds;

      const storedSeconds = Number(task.seconds);
      return Number.isFinite(storedSeconds) && storedSeconds > 0 ? storedSeconds : 0;
    }

    function formatTime(totalSeconds) {
      const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const secs = String(totalSeconds % 60).padStart(2, '0');
      return `${hrs}:${mins}:${secs}`;
    }

    function formatDateTime(value) {
      if (!value) return '--';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '--';

      return date.toLocaleString([], {
        hour: 'numeric',
        minute: '2-digit'
      });
    }

    function exportTasks() {
      if (state.tasks.length === 0) {
        alert('No data available to export yet.');
        return;
      }

      const rows = [['Task Name', 'Start', 'End', 'Duration', 'Seconds']];
      state.tasks.forEach(task => {
        const seconds = getTaskSeconds(task);
        rows.push([
          task.name,
          task.startedAtDisplay || formatDateTime(task.startedAt),
          task.endedAtDisplay || formatDateTime(task.endedAt),
          formatTime(seconds),
          seconds
        ]);
      });

      const csv = rows.map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = 'shift_tasks_log.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
